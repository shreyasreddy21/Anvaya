server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA -- serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=*, microphone=()" always;

    # Webcam (getUserMedia) only requires a SECURE CONTEXT (HTTPS) + this
    # Permissions-Policy — NOT COEP. The MediaPipe Face Landmarker runs with the
    # CPU delegate (single-threaded), so it does not need SharedArrayBuffer, and
    # therefore must NOT be cross-origin-isolated. Setting COEP "require-corp"
    # here blocks the cross-origin MediaPipe WASM/model fetches from the CDN,
    # which throws before camera.start() runs — so the camera permission prompt
    # never appears in production. Do not re-add COOP/COEP here.
}

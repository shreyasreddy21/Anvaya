server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets aggressively (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # React SPA -- serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=*, microphone=()" always;

    # Webcam (getUserMedia) requires a SECURE CONTEXT (HTTPS) + this
    # Permissions-Policy — it does NOT require COEP. The MediaPipe Face Landmarker
    # runs with the CPU delegate (single-threaded), so it never needs
    # SharedArrayBuffer and must NOT be cross-origin-isolated. COOP/COEP are
    # therefore removed: they add no benefit here and `require-corp` would block
    # any cross-origin subresource that lacks a CORP/CORS header, which is a
    # needless production fragility. (The MediaPipe CDN assets themselves do send
    # cross-origin-resource-policy/CORS headers, so COEP was not what broke the
    # camera — a non-secure-context origin is the usual cause; see
    # src/utils/cameraSupport.js, which now reports that explicitly.)
    # Do not re-add COOP/COEP here.
}

version: "3.9"

# ──────────────────────────────────────────────────────────────────────────────
# Anvaya / JoyVerse — Production Docker Compose
#
# Usage:
#   cp .env.production.example .env.production
#   Fill in all values in .env.production
#   docker compose --env-file .env.production up -d --build
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Backend API (Node.js / Express) ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anvaya-backend
    restart: unless-stopped
    env_file: .env.production
    environment:
      NODE_ENV: production
    ports:
      - "4000:4000"
    networks:
      - anvaya-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Frontend (React / Vite → nginx) ────────────────────────────────────────
  frontend:
    build:
      context: ./frontend/joyverse
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: anvaya-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - anvaya-net
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Transformer / FaceMesh (React + TensorFlow.js → nginx) ─────────────────
  transformer:
    build:
      context: ./transformer/facemesh/my-facemesh-app
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: ${REACT_APP_API_URL}
    container_name: anvaya-transformer
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - anvaya-net
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Nginx Reverse Proxy (routes all traffic on ports 80 / 443) ─────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: anvaya-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro       # Put your TLS certs here
    networks:
      - anvaya-net
    depends_on:
      - frontend
      - backend
      - transformer
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  anvaya-net:
    driver: bridge

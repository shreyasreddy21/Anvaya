name: CI / CD -- Build, Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # -- Backend tests -----------------------------------------------------------
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_at_least_32_characters_long
          MONGO_URI: mongodb://localhost:27017/joyverse_test

  # -- Frontend tests & build --------------------------------------------------
  test-frontend:
    name: Frontend Tests & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/joyverse
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/joyverse/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          REACT_APP_API_URL: https://yourdomain.com

  # -- Transformer build -------------------------------------------------------
  test-transformer:
    name: Transformer Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: transformer/facemesh/my-facemesh-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: transformer/facemesh/my-facemesh-app/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          REACT_APP_API_URL: https://yourdomain.com

  # -- Docker build & push -----------------------------------------------------
  docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, test-transformer]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/anvaya-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend/joyverse
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/anvaya-frontend:latest
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push transformer
        uses: docker/build-push-action@v5
        with:
          context: ./transformer/facemesh/my-facemesh-app
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/anvaya-transformer:latest
          build-args: |
            REACT_APP_API_URL=${{ secrets.REACT_APP_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # -- Deploy to VPS via SSH ---------------------------------------------------
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/anvaya
            git pull origin main
            docker compose --env-file .env.production pull
            docker compose --env-file .env.production up -d --build --remove-orphans
            docker image prune -f
